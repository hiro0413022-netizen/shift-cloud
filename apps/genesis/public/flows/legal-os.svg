<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 564" role="img"><title>Legal OS フロー</title><defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6b7f99"/></marker></defs><rect x="0" y="0" width="680" height="564" rx="12" fill="#05070d"/><rect x="40" y="16" width="260" height="30" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="170" y="36.5" text-anchor="middle" font-size="13.5" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">Legal OS（契約書・期限管理）</text><rect x="40" y="64" width="340" height="56" rx="7" fill="#0B2E55" stroke="#5EA1E6" stroke-width="1.3"/><text x="210" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#D6E8FB" font-family="ui-sans-serif, system-ui, sans-serif">スタッフが契約書をアップロード</text><text x="210" y="108" text-anchor="middle" font-size="13" fill="#8FBFF0" font-family="ui-sans-serif, system-ui, sans-serif">古川さん以外もログインできる入力面</text><line x1="210" y1="120" x2="210" y2="144" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="148" width="340" height="56" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="210" y="169" text-anchor="middle" font-size="16" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">Storage legal-docs ＋ leg_*</text><text x="210" y="192" text-anchor="middle" font-size="13" fill="#9AABC4" font-family="ui-sans-serif, system-ui, sans-serif">署名付きURL・company_idでパス分離</text><line x1="210" y1="204" x2="210" y2="228" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="232" width="340" height="56" rx="7" fill="#07364A" stroke="#3ECBEC" stroke-width="1.3"/><text x="210" y="253" text-anchor="middle" font-size="16" font-weight="600" fill="#CDF3FC" font-family="ui-sans-serif, system-ui, sans-serif">legal_ai が要点・リスク・期限を提案</text><text x="210" y="276" text-anchor="middle" font-size="13" fill="#7ADFF5" font-family="ui-sans-serif, system-ui, sans-serif">OCR → 人が確定</text><line x1="210" y1="288" x2="210" y2="312" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="316" width="340" height="56" rx="7" fill="#07364A" stroke="#3ECBEC" stroke-width="1.3"/><text x="210" y="337" text-anchor="middle" font-size="16" font-weight="600" fill="#CDF3FC" font-family="ui-sans-serif, system-ui, sans-serif">期限接近で自動アラート</text><text x="210" y="360" text-anchor="middle" font-size="13" fill="#7ADFF5" font-family="ui-sans-serif, system-ui, sans-serif">notifications ＋ CEO AI 判断リスト</text><line x1="210" y1="372" x2="210" y2="396" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="400" width="340" height="56" rx="7" fill="#0B2E55" stroke="#5EA1E6" stroke-width="1.3"/><text x="210" y="421" text-anchor="middle" font-size="16" font-weight="600" fill="#D6E8FB" font-family="ui-sans-serif, system-ui, sans-serif">締結・更新・解約は承認へ</text><text x="210" y="444" text-anchor="middle" font-size="13" fill="#8FBFF0" font-family="ui-sans-serif, system-ui, sans-serif">approval_requests に起票</text><line x1="210" y1="456" x2="210" y2="480" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="484" width="340" height="56" rx="7" fill="#232060" stroke="#9BA6F2" stroke-width="1.3"/><text x="210" y="505" text-anchor="middle" font-size="16" font-weight="600" fill="#DDE1FC" font-family="ui-sans-serif, system-ui, sans-serif">古川さんがGENESISで承認</text><text x="210" y="528" text-anchor="middle" font-size="13" fill="#AEB6F5" font-family="ui-sans-serif, system-ui, sans-serif">decision_logs に記録</text><rect x="430" y="148" width="218" height="56" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="539" y="169" text-anchor="middle" font-size="13.5" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">経理の証憑とは分離</text><text x="539" y="192" text-anchor="middle" font-size="12" fill="#9AABC4" font-family="ui-sans-serif, system-ui, sans-serif">請求書・領収書は mon_receipts</text><line x1="380" y1="176" x2="426" y2="176" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/></svg>