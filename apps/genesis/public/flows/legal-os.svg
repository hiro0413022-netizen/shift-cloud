<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 542" role="img"><title>Legal OS フロー</title><defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8a897f"/></marker></defs><rect x="40" y="16" width="250" height="28" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="165" y="35" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">Legal OS（契約書・期限管理）</text><rect x="40" y="60" width="340" height="52" rx="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.2"/><text x="210" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#9FE1CB" font-family="ui-sans-serif, system-ui, sans-serif">スタッフが契約書をアップロード</text><text x="210" y="100" text-anchor="middle" font-size="11.5" fill="#5DCAA5" font-family="ui-sans-serif, system-ui, sans-serif">古川さん以外もログインできる入力面</text><line x1="210" y1="112" x2="210" y2="134" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="138" width="340" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="210" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">Storage legal-docs ＋ leg_*</text><text x="210" y="178" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">署名付きURL・company_idでパス分離</text><line x1="210" y1="190" x2="210" y2="212" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="216" width="340" height="52" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="1.2"/><text x="210" y="236" text-anchor="middle" font-size="14" font-weight="600" fill="#F5C4B3" font-family="ui-sans-serif, system-ui, sans-serif">legal_ai が要点・リスク・期限を提案</text><text x="210" y="256" text-anchor="middle" font-size="11.5" fill="#F0997B" font-family="ui-sans-serif, system-u