<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" role="img"><title>Report OS フロー</title><defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6b7f99"/></marker></defs><rect x="0" y="0" width="680" height="480" rx="12" fill="#05070d"/><rect x="40" y="16" width="270" height="30" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="175" y="36.5" text-anchor="middle" font-size="13.5" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">Report OS（月次資料の自動生成）</text><rect x="40" y="64" width="340" height="56" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="210" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">データ源を読む（共有DB）</text><text x="210" y="108" text-anchor="middle" font-size="13" fill="#9AABC4" font-family="ui-sans-serif, system-ui, sans-serif">mbr_*（会員・体験）・kpis・fin_entries</text><line x1="210" y1="120" x2="210" y2="144" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="148" width="340" height="56" rx="7" fill="#07364A" stroke="#3ECBEC" stroke-width="1.3"/><text x="210" y="169" text-anchor="middle" font-size="16" font-weight="600" fill="#CDF3FC" font-family="ui-sans-serif, system-ui, sans-serif">generate.js が数値を自動集計</text><text x="210" y="192" text-anchor="middle" font-size="13" fill="#7ADFF5" font-family="ui-sans-serif, system-ui, sans-serif">JSON駆動・前月比・前年比</text><line x1="210" y1="204" x2="210" y2="228" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="232" width="340" height="56" rx="7" fill="#07364A" stroke="#3ECBEC" stroke-width="1.3"/><text x="210" y="253" text-anchor="middle" font-size="16" font-weight="600" fill="#CDF3FC" font-family="ui-sans-serif, system-ui, sans-serif">Claude API が文章を下書き</text><text x="210" y="276" text-anchor="middle" font-size="13" fill="#7ADFF5" font-family="ui-sans-serif, system-ui, sans-serif">実施事項・問題点・解決策・情報共有</text><line x1="210" y1="288" x2="210" y2="312" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="316" width="340" height="56" rx="7" fill="#07364A" stroke="#3ECBEC" stroke-width="1.3"/><text x="210" y="337" text-anchor="middle" font-size="16" font-weight="600" fill="#CDF3FC" font-family="ui-sans-serif, system-ui, sans-serif">.pptx 8枚を生成</text><text x="210" y="360" text-anchor="middle" font-size="13" fill="#7ADFF5" font-family="ui-sans-serif, system-ui, sans-serif">サマリー・推移チャート・指標一覧</text><line x1="210" y1="372" x2="210" y2="396" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="400" width="340" height="56" rx="7" fill="#232060" stroke="#9BA6F2" stroke-width="1.3"/><text x="210" y="421" text-anchor="middle" font-size="16" font-weight="600" fill="#DDE1FC" font-family="ui-sans-serif, system-ui, sans-serif">古川さんは承認・修正だけ</text><text x="210" y="444" text-anchor="middle" font-size="13" fill="#AEB6F5" font-family="ui-sans-serif, system-ui, sans-serif">第1弾 GOLF WING → 全事業所へ横展開</text><rect x="430" y="64" width="218" height="56" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="539" y="85" text-anchor="middle" font-size="13.5" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">member-os取込が前提</text><text x="539" y="108" text-anchor="middle" font-size="12" fill="#9AABC4" font-family="ui-sans-serif, system-ui, sans-serif">一時利用・予約の取込は残課題</text><line x1="380" y1="92" x2="426" y2="92" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/></svg>