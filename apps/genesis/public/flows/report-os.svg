<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 464" role="img"><title>Report OS フロー</title><defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8a897f"/></marker></defs><rect x="40" y="16" width="260" height="28" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="170" y="35" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">Report OS（月次資料の自動生成）</text><rect x="40" y="60" width="340" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="210" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">データ源を読む（共有DB）</text><text x="210" y="100" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">mbr_*（会員・体験）・kpis・fin_entries</text><line x1="210" y1="112" x2="210" y2="134" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="138" width="340" height="52" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="1.2"/><text x="210" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#F5C4B3" font-family="ui-sans-serif, system-ui, sans-serif">generate.js が数値を自動集計</text><text x="210" y="178" text-anchor="middle" font-size="11.5" fill="#F0997B" font-family="ui-sans-serif, system-ui, sans-serif">JSON駆動・前月比・前年比</text><line x1="210" y1="190" x2="210" y2="212" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="216" width="340" height="52" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="1.2"/><text x="210" y="236" text-anchor="middle" font-size="14" font-weight="600" fill="#F5C4B3" font-family="ui-sans-serif, system-ui, sans-serif">Claude API が文章を下書き</text><text x="210" y="256" text-anchor="middle" font-size="11.5" fill="#F0997B" font-family="ui-sans-serif, system-ui, sans-serif">実施事項・問題点・解決策・情報共有</text><line x1="210" y1="268" x2="210" y2="290" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="294" width="340" height="52" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="1.2"/><text x="210" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#F5C4B3" font-family="ui-sans-serif, system-ui, sans-serif">.pptx 8枚を生成</text><text x="210" y="334" text-anchor="middle" font-size="11.5" fill="#F0997B" font-family="ui-sans-serif, system-ui, sans-serif">サマリー・推移チャート・指標一覧</text><line x1="210" y1="346" x2="210" y2="368" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="372" width="340" height="52" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="1.2"/><text x="210" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#CECBF6" font-family="ui-sans-serif, system-ui, sans-serif">古川さんは承認・修正だけ</text><text x="210" y="412" text-anchor="middle" font-size="11.5" fill="#AFA9EC" font-family="ui-sans-serif, system-ui, sans-serif">第1弾 GOLF WING → 全事業所へ横展開</text><rect x="430" y="60" width="210" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="535" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">member-os取込が前提</text><text x="535" y="100" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">一時利用・予約の取込は残課題</text><line x1="380" y1="86" x2="426" y2="86" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/></svg>