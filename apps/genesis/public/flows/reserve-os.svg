<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 542" role="img"><title>Reserve OS フロー</title><defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8a897f"/></marker></defs><rect x="40" y="16" width="250" height="28" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="165" y="35" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">Reserve OS（ビジター予約）</text><rect x="40" y="60" width="340" height="52" rx="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.2"/><text x="210" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#9FE1CB" font-family="ui-sans-serif, system-ui, sans-serif">公式LINE → 公開ページ</text><text x="210" y="100" text-anchor="middle" font-size="11.5" fill="#5DCAA5" font-family="ui-sans-serif, system-ui, sans-serif">/reserve/shaft-fitting・認証不要</text><line x1="210" y1="112" x2="210" y2="134" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="138" width="340" height="52" rx="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.2"/><text x="210" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#9FE1CB" font-family="ui-sans-serif, system-ui, sans-serif">候補日時3つ＋ヒアリング送信</text><text x="210" y="178" text-anchor="middle" font-size="11.5" fill="#5DCAA5" font-family="ui-sans-serif, system-ui, sans-serif">即確定しない申込型・必須は最小化</text><line x1="210" y1="190" x2="210" y2="212" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="216" width="340" height="52" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="1.2"/><text x="210" y="236" text-anchor="middle" font-size="14" font-weight="600" fill="#F5C4B3" font-family="ui-sans-serif, system-ui, sans-serif">res_requests（pending）</text><text x="210" y="256" text-anchor="middle" font-size="11.5" fill="#F0997B" font-family="ui-sans-serif, system-ui, sans-serif">スタッフ通知メールを自動送信</text><line x1="210" y1="268" x2="210" y2="290" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="294" width="340" height="52" rx="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.2"/><text x="210" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#9FE1CB" font-family="ui-sans-serif, system-ui, sans-serif">スタッフが目視で確認</text><text x="210" y="334" text-anchor="middle" font-size="11.5" fill="#5DCAA5" font-family="ui-sans-serif, system-ui, sans-serif">対応可能スタッフ・枠の重複をチェック</text><line x1="210" y1="346" x2="210" y2="368" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="372" width="340" height="52" rx="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.2"/><text x="210" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#9FE1CB" font-family="ui-sans-serif, system-ui, sans-serif">確定 or 別日時調整</text><text x="210" y="412" text-anchor="middle" font-size="11.5" fill="#5DCAA5" font-family="ui-sans-serif, system-ui, sans-serif">確定メールをお客様へ送信</text><line x1="210" y1="424" x2="210" y2="446" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="450" width="340" height="52" rx="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.2"/><text x="210" y="470" text-anchor="middle" font-size="14" font-weight="600" fill="#9FE1CB" font-family="ui-sans-serif, system-ui, sans-serif">来店 → completed</text><text x="210" y="490" text-anchor="middle" font-size="11.5" fill="#5DCAA5" font-family="ui-sans-serif, system-ui, sans-serif">見送り・キャンセルも記録</text><rect x="430" y="60" width="210" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="535" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">res_services</text><text x="535" y="100" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">メニュー・料金・導入文を駆動</text><line x1="380" y1="86" x2="426" y2="86" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="430" y="372" width="210" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="535" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">メール送信</text><text x="535" y="412" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">golfwingアドレスから</text><line x1="380" y1="398" x2="426" y2="398" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/></svg>