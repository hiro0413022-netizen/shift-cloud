<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 542" role="img"><title>Caddy OS フロー</title><defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8a897f"/></marker></defs><rect x="40" y="16" width="230" height="28" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="155" y="35" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">Caddy OS（キャディ派遣）</text><rect x="40" y="60" width="340" height="52" rx="6" fill="#085041" stroke="#5DCAA5" stroke-width="1.2"/><text x="210" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#9FE1CB" font-family="ui-sans-serif, system-ui, sans-serif">派遣を登録（1派遣＝1行）</text><text x="210" y="100" text-anchor="middle" font-size="11.5" fill="#5DCAA5" font-family="ui-sans-serif, system-ui, sans-serif">一括入力グリッド・seq自動採番</text><line x1="210" y1="112" x2="210" y2="134" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="138" width="340" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="210" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">cad_dispatches</text><text x="210" y="178" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">売上と原価を同じ行に → 行単位の粗利</text><line x1="210" y1="190" x2="210" y2="212" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="216" width="340" height="52" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="1.2"/><text x="210" y="236" text-anchor="middle" font-size="14" font-weight="600" fill="#F5C4B3" font-family="ui-sans-serif, system-ui, sans-serif">社員行は原価0を構造で強制</text><text x="210" y="256" text-anchor="middle" font-size="11.5" fill="#F0997B" font-family="ui-sans-serif, system-ui, sans-serif">CHECK制約・交通費の二重計上を防止</text><line x1="210" y1="268" x2="210" y2="290" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="294" width="340" height="52" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="1.2"/><text x="210" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#F5C4B3" font-family="ui-sans-serif, system-ui, sans-serif">refresh_caddy_finance</text><text x="210" y="334" text-anchor="middle" font-size="11.5" fill="#F0997B" font-family="ui-sans-serif, system-ui, sans-serif">登録・削除のたび自動実行</text><line x1="210" y1="346" x2="210" y2="368" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="372" width="340" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="210" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">fin_entries へ upsert</text><text x="210" y="412" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">売上高・外注費（人件費は給与側の担当）</text><line x1="210" y1="424" x2="210" y2="446" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/><rect x="40" y="450" width="340" height="52" rx="6" fill="#3C3489" stroke="#AFA9EC" stroke-width="1.2"/><text x="210" y="470" text-anchor="middle" font-size="14" font-weight="600" fill="#CECBF6" font-family="ui-sans-serif, system-ui, sans-serif">GENESIS 事業別PL・5大KPI</text><text x="210" y="490" text-anchor="middle" font-size="11.5" fill="#AFA9EC" font-family="ui-sans-serif, system-ui, sans-serif">月次売上・営業利益</text><rect x="430" y="60" width="210" height="52" rx="6" fill="#3E3E3B" stroke="#B4B2A9" stroke-width="1.2"/><text x="535" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#D3D1C7" font-family="ui-sans-serif, system-ui, sans-serif">cad_clients / cad_partners</text><text x="535" y="100" text-anchor="middle" font-size="11.5" fill="#B4B2A9" font-family="ui-sans-serif, system-ui, sans-serif">単価・締め日・振込日を保持</text><line x1="380" y1="86" x2="426" y2="86" stroke="#8a897f" stroke-width="1.5" marker-end="url(#ar)"/></svg>