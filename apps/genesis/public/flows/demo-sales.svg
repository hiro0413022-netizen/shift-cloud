<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" role="img"><title>AI DEMO SALES フロー</title><defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6b7f99"/></marker></defs><rect x="0" y="0" width="680" height="480" rx="12" fill="#05070d"/><rect x="40" y="16" width="320" height="30" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="200" y="36.5" text-anchor="middle" font-size="13.5" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">AI DEMO SALES（営業デモ高速生成）</text><rect x="40" y="64" width="340" height="56" rx="7" fill="#141D2B" stroke="#7C8DA6" stroke-width="1.3"/><text x="210" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#D9E1EC" font-family="ui-sans-serif, system-ui, sans-serif">営業先を登録（dms_prospects）</text><text x="210" y="108" text-anchor="middle" font-size="13" fill="#9AABC4" font-family="ui-sans-serif, system-ui, sans-serif">院名・現サイトURL・Googleマップ</text><line x1="210" y1="120" x2="210" y2="144" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="148" width="340" height="56" rx="7" fill="#07364A" stroke="#3ECBEC" stroke-width="1.3"/><text x="210" y="169" text-anchor="middle" font-size="16" font-weight="600" fill="#CDF3FC" font-family="ui-sans-serif, system-ui, sans-serif">現サイト分析・営業スコア</text><text x="210" y="192" text-anchor="middle" font-size="13" fill="#7ADFF5" font-family="ui-sans-serif, system-ui, sans-serif">良い点・改善余地・注意点（Claude支援）</text><line x1="210" y1="204" x2="210" y2="228" stroke="#6b7f99" stroke-width="1.6" marker-end="url(#ar)"/><rect x="40" y="232" width="340" height="56" rx="7" fill="#07364A" stroke="#3ECBEC" stroke-width="1.3"/><text x="210" y="253" text-anchor="middle" font-size="16" font-weight="600" fill="#CDF3FC" font-family="ui-sans-serif, system-ui, sans-serif">業種テンプレ×実データでデモ即生成</text><text x="210" y="276" text-anchor="middle" fo