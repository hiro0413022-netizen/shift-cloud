<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員登録 / ログイン | KALLINOS</title>
  <meta name="description" content="KALLINOSの会員登録・ログイン。会員登録で¥3,000クーポンをプレゼント。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: 100svh;
      padding: calc(var(--header-height) + 3rem) 0 var(--spacing-xl);
      background: var(--color-beige);
    }

    .auth-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 0 var(--spacing-sm);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: var(--spacing-md);
    }

    .auth-logo-text {
      font-family: var(--font-secondary);
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--color-black);
    }

    .auth-card {
      background: var(--color-white);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-soft);
    }

    @media (max-width: 480px) {
      .auth-card { padding: var(--spacing-md); }
    }

    .auth-tabs {
      display: flex;
      margin-bottom: var(--spacing-md);
      border-bottom: var(--border-thin);
    }

    .auth-tab {
      flex: 1;
      padding: 0.875rem;
      font-family: var(--font-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-grey-4);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: var(--transition-fast);
      text-align: center;
    }

    .auth-tab.active {
      color: var(--color-black);
      border-bottom-color: var(--color-black);
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .auth-title {
      font-family: var(--font-primary);
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--color-black);
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
    }

    .auth-desc {
      font-size: 0.83rem;
      color: var(--color-grey-3);
      line-height: 1.7;
      margin-bottom: var(--spacing-md);
    }

    .password-wrap {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-grey-4);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .register-benefit {
      background: var(--color-beige);
      padding: 1rem;
      margin-bottom: var(--spacing-md);
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .register-benefit i {
      color: var(--color-gold);
      margin-top: 0.1rem;
    }

    .register-benefit-text {
      font-size: 0.82rem;
      color: var(--color-grey-2);
      line-height: 1.6;
    }

    .register-benefit strong { color: var(--color-black); }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .divider-text span {
      font-family: var(--font-secondary);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--color-grey-4);
      white-space: nowrap;
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-grey-5);
    }

    /* Account dashboard */
    .account-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding-bottom: var(--spacing-md);
      border-bottom: var(--border-thin);
      margin-bottom: var(--spacing-md);
    }

    .account-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--color-grey-6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--color-grey-4);
      flex-shrink: 0;
    }

    .account-name {
      font-family: var(--font-primary);
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--color-black);
      margin-bottom: 0.2rem;
    }

    .account-email {
      font-size: 0.82rem;
      color: var(--color-grey-3);
    }

    .account-menu {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .account-menu-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: var(--border-thin);
      font-family: var(--font-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--color-grey-2);
      cursor: pointer;
      transition: var(--transition-fast);
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      text-align: left;
      width: 100%;
    }

    .account-menu-item:hover { color: var(--color-black); }
    .account-menu-item i { width: 1.2rem; text-align: center; color: var(--color-gold); }
    .account-menu-item .menu-arrow { margin-left: auto; font-size: 0.7rem; color: var(--color-grey-5); }
  </style>
</head>
<body>
  <div id="header-mount"></div>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <a href="index.html" class="auth-logo-text">KALLINOS</a>
      </div>

      <!-- Not logged in view -->
      <div id="authFormView">
        <div class="auth-card fade-up">
          <!-- Tabs -->
          <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">ログイン</button>
            <button class="auth-tab" id="registerTab" onclick="switchTab('register')">会員登録</button>
          </div>

          <!-- Login Panel -->
          <div class="auth-panel active" id="loginPanel">
            <h1 class="auth-title">ログイン</h1>
            <p class="auth-desc">KALLINOS会員の方はこちらからログインしてください。</p>

            <form id="loginForm" novalidate>
              <div class="form-group">
                <label class="form-label" for="loginEmail">メールアドレス <span style="color:#C0392B">*</span></label>
                <input type="email" id="loginEmail" class="form-input" placeholder="example@email.com" required>
                <div class="form-error" id="loginEmailErr">メールアドレスを入力してください</div>
              </div>
              <div class="form-group">
                <label class="form-label" for="loginPassword">パスワード <span style="color:#C0392B">*</span></label>
                <div class="password-wrap">
                  <input type="password" id="loginPassword" class="form-input" placeholder="パスワードを入力" required>
                  <i class="far fa-eye password-toggle" onclick="togglePw('loginPassword', this)"></i>
                </div>
                <div class="form-error" id="loginPassErr">パスワードを入力してください</div>
              </div>

              <div style="text-align:right; margin-bottom:1.5rem">
                <a href="#" style="font-size:0.78rem; color:var(--color-gold); text-decoration:underline">パスワードをお忘れですか？</a>
              </div>

              <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                <span id="loginBtnText">ログイン</span>
                <div class="spinner" id="loginSpinner" style="display:none"></div>
              </button>
            </form>

            <div class="divider-text"><span>または</span></div>
            <p style="text-align:center; font-size:0.83rem; color:var(--color-grey-3)">
              まだ会員でない方は
              <button onclick="switchTab('register')" style="color:var(--color-gold); text-decoration:underline; font-size:0.83rem; background:none; border:none; cursor:pointer">会員登録（無料）</button>
              へ
            </p>
          </div>

          <!-- Register Panel -->
          <div class="auth-panel" id="registerPanel">
            <h1 class="auth-title">会員登録</h1>
            <p class="auth-desc">無料で会員登録して、KALLINOSの特典をお楽しみください。</p>

            <div class="register-benefit">
              <i class="fas fa-gift"></i>
              <div class="register-benefit-text">
                <strong>新規会員登録特典</strong><br>
                ご登録後の初回購入で使える <strong>¥3,000クーポン</strong> をプレゼント！<br>
                クーポンコード：<strong>WELCOME3000</strong>
              </div>
            </div>

            <form id="registerForm" novalidate>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem">
                <div class="form-group">
                  <label class="form-label" for="regLastName">姓 <span style="color:#C0392B">*</span></label>
                  <input type="text" id="regLastName" class="form-input" placeholder="山田" required>
                  <div class="form-error" id="regLastErr">姓を入力してください</div>
                </div>
                <div class="form-group">
                  <label class="form-label" for="regFirstName">名 <span style="color:#C0392B">*</span></label>
                  <input type="text" id="regFirstName" class="form-input" placeholder="太郎" required>
                  <div class="form-error" id="regFirstErr">名を入力してください</div>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="regEmail">メールアドレス <span style="color:#C0392B">*</span></label>
                <input type="email" id="regEmail" class="form-input" placeholder="example@email.com" required>
                <div class="form-error" id="regEmailErr">有効なメールアドレスを入力してください</div>
              </div>

              <div class="form-group">
                <label class="form-label" for="regPhone">電話番号</label>
                <input type="tel" id="regPhone" class="form-input" placeholder="090-0000-0000">
              </div>

              <div class="form-group">
                <label class="form-label" for="regPassword">パスワード <span style="color:#C0392B">*</span></label>
                <div class="password-wrap">
                  <input type="password" id="regPassword" class="form-input" placeholder="8文字以上" required minlength="8">
                  <i class="far fa-eye password-toggle" onclick="togglePw('regPassword', this)"></i>
                </div>
                <div class="form-error" id="regPassErr">8文字以上のパスワードを入力してください</div>
              </div>

              <div class="form-group">
                <label class="form-label" for="regPasswordConfirm">パスワード（確認） <span style="color:#C0392B">*</span></label>
                <div class="password-wrap">
                  <input type="password" id="regPasswordConfirm" class="form-input" placeholder="もう一度入力" required>
                  <i class="far fa-eye password-toggle" onclick="togglePw('regPasswordConfirm', this)"></i>
                </div>
                <div class="form-error" id="regPassConfErr">パスワードが一致しません</div>
              </div>

              <div class="form-group">
                <label class="filter-item" style="cursor:pointer; display:flex; align-items:flex-start; gap:0.75rem; margin-bottom:0.75rem">
                  <input type="checkbox" id="regNewsletter" style="display:none" checked>
                  <div class="filter-checkbox checked" id="newsletterCb"></div>
                  <span style="font-size:0.8rem; color:var(--color-grey-3); line-height:1.6">新作情報・セール・特典のメールマガジンを受け取る</span>
                </label>

                <label class="filter-item" style="cursor:pointer; display:flex; align-items:flex-start; gap:0.75rem">
                  <input type="checkbox" id="regTerms" style="display:none" required>
                  <div class="filter-checkbox" id="termsCb"></div>
                  <span style="font-size:0.8rem; color:var(--color-grey-3); line-height:1.6">
                    <a href="legal.html#terms" target="_blank" style="color:var(--color-gold); text-decoration:underline">利用規約</a>・
                    <a href="legal.html#privacy" target="_blank" style="color:var(--color-gold); text-decoration:underline">プライバシーポリシー</a>に同意します <span style="color:#C0392B">*</span>
                  </span>
                </label>
                <div class="form-error" id="regTermsErr">同意が必要です</div>
              </div>

              <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
                <span id="registerBtnText">会員登録する</span>
                <div class="spinner" id="registerSpinner" style="display:none"></div>
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Logged in / Account view -->
      <div id="accountView" style="display:none">
        <div class="auth-card fade-up">
          <div class="account-header">
            <div class="account-avatar"><i class="fas fa-user"></i></div>
            <div>
              <div class="account-name" id="accountName">—</div>
              <div class="account-email" id="accountEmail">—</div>
            </div>
          </div>

          <div class="account-menu">
            <button class="account-menu-item" onclick="location.href='#'">
              <i class="fas fa-box"></i> 注文履歴
              <i class="fas fa-chevron-right menu-arrow"></i>
            </button>
            <button class="account-menu-item" onclick="location.href='#'">
              <i class="far fa-heart"></i> お気に入りリスト
              <i class="fas fa-chevron-right menu-arrow"></i>
            </button>
            <button class="account-menu-item" onclick="location.href='#'">
              <i class="fas fa-map-marker-alt"></i> 配送先住所
              <i class="fas fa-chevron-right menu-arrow"></i>
            </button>
            <button class="account-menu-item" onclick="location.href='#'">
              <i class="fas fa-user-edit"></i> プロフィール編集
              <i class="fas fa-chevron-right menu-arrow"></i>
            </button>
            <button class="account-menu-item" onclick="location.href='#'">
              <i class="fas fa-envelope"></i> メールマガジン設定
              <i class="fas fa-chevron-right menu-arrow"></i>
            </button>
            <button class="account-menu-item" onclick="doLogout()">
              <i class="fas fa-sign-out-alt"></i> ログアウト
              <i class="fas fa-chevron-right menu-arrow"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    let newsletterOk = true;
    let termsOk      = false;

    document.addEventListener('DOMContentLoaded', () => {
      injectComponents('');
      initAuthPage();
    });

    function initAuthPage() {
      const user = Auth.getUser();
      if (user) {
        showAccountView(user);
        return;
      }

      // Check URL tab
      const params = new URLSearchParams(location.search);
      if (params.get('tab') === 'register') switchTab('register');

      // Login form
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      // Register form
      document.getElementById('registerForm').addEventListener('submit', handleRegister);

      // Checkboxes
      const newsletterCb = document.getElementById('newsletterCb');
      newsletterCb.addEventListener('click', () => {
        newsletterOk = !newsletterOk;
        newsletterCb.classList.toggle('checked', newsletterOk);
        document.getElementById('regNewsletter').checked = newsletterOk;
      });

      const termsCb = document.getElementById('termsCb');
      termsCb.addEventListener('click', () => {
        termsOk = !termsOk;
        termsCb.classList.toggle('checked', termsOk);
        document.getElementById('regTerms').checked = termsOk;
      });
    }

    function switchTab(tab) {
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
      document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
      document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    }

    window.switchTab = switchTab;

    function togglePw(id, icon) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      icon.className = isText ? 'far fa-eye password-toggle' : 'far fa-eye-slash password-toggle';
    }

    window.togglePw = togglePw;

    // Simple hash (for demo, not production-grade)
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return hash.toString(36);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      const showErr = (id, show) => document.getElementById(id).classList.toggle('show', show);
      showErr('loginEmailErr', !email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
      showErr('loginPassErr',  !password);
      if (!email || !password) return;

      const btn = document.getElementById('loginBtn');
      const txt = document.getElementById('loginBtnText');
      const sp  = document.getElementById('loginSpinner');
      btn.disabled = true; txt.textContent = '...'; sp.style.display = '';

      try {
        const member = await API.getMemberByEmail(email);
        if (!member || member.password_hash !== simpleHash(password)) {
          showToast('メールアドレスまたはパスワードが正しくありません', 'error');
          return;
        }
        const token = btoa(`${member.id}:${Date.now()}`);
        Auth.login(member, token);
        showToast(`おかえりなさい、${member.last_name}様`, 'success');
        setTimeout(() => {
          const redirect = new URLSearchParams(location.search).get('redirect');
          location.href = redirect || 'index.html';
        }, 800);
      } catch {
        showToast('ログインに失敗しました', 'error');
      } finally {
        btn.disabled = false; txt.textContent = 'ログイン'; sp.style.display = 'none';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const last   = document.getElementById('regLastName').value.trim();
      const first  = document.getElementById('regFirstName').value.trim();
      const email  = document.getElementById('regEmail').value.trim();
      const phone  = document.getElementById('regPhone').value.trim();
      const pass   = document.getElementById('regPassword').value;
      const pass2  = document.getElementById('regPasswordConfirm').value;

      const showErr = (id, show) => document.getElementById(id).classList.toggle('show', show);
      let valid = true;

      if (!last)  { showErr('regLastErr', true);  valid = false; } else showErr('regLastErr', false);
      if (!first) { showErr('regFirstErr', true); valid = false; } else showErr('regFirstErr', false);
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('regEmailErr', true); valid = false; } else showErr('regEmailErr', false);
      if (!pass || pass.length < 8) { showErr('regPassErr', true); valid = false; } else showErr('regPassErr', false);
      if (pass !== pass2) { showErr('regPassConfErr', true); valid = false; } else showErr('regPassConfErr', false);
      if (!termsOk) { showErr('regTermsErr', true); valid = false; } else showErr('regTermsErr', false);

      if (!valid) return;

      const btn = document.getElementById('registerBtn');
      const txt = document.getElementById('registerBtnText');
      const sp  = document.getElementById('registerSpinner');
      btn.disabled = true; txt.textContent = '登録中...'; sp.style.display = '';

      try {
        const member = await API.createMember({
          last_name:     last,
          first_name:    first,
          email,
          phone,
          password_hash: simpleHash(pass),
          newsletter:    newsletterOk,
          is_active:     true,
        });
        const token = btoa(`${member.id}:${Date.now()}`);
        Auth.login(member, token);
        showToast(`ご登録ありがとうございます、${last}様！`, 'success');
        setTimeout(() => { location.href = 'index.html'; }, 800);
      } catch {
        showToast('登録に失敗しました。後ほどお試しください', 'error');
        btn.disabled = false; txt.textContent = '会員登録する'; sp.style.display = 'none';
      }
    }

    function showAccountView(user) {
      document.getElementById('authFormView').style.display = 'none';
      document.getElementById('accountView').style.display = 'block';
      document.getElementById('accountName').textContent  = `${user.last_name || ''} ${user.first_name || ''}`.trim() || 'ゲスト';
      document.getElementById('accountEmail').textContent = user.email || '';
    }

    function doLogout() {
      Auth.logout();
      location.reload();
    }

    window.doLogout = doLogout;
  </script>
</body>
</html>
