# CI — 金額ロジックのテスト＋全Nextアプリの型検査/ビルド（AUDIT_2026-07-11 B-3）
# ローカル環境（サンドボックス）のtsc/buildは信頼できないため、ここが検証の正。
# Secretsは使わない（Publicリポジトリ DECISIONS #14）。ビルドはダミーenvで行う。
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 金額ロジックテスト（node --test）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # tests/ は依存パッケージ不要（純粋ロジックのみを対象にしているため install しない）
      - run: npm test
      # 給与・労働時間ロジックの二重実装ガード（DECISIONS #53）
      # 画面ごとに work_minutes を合計したり hourly_wage を掛けたりすると、
      # 15分丸め・月給・交通費が抜けて給与画面と数字が割れる。機械的に落とす。
      - run: npm run check:labor

  build:
    name: build+tsc (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - caddy-os
          - lesson-os
          - corporate
          - genesis
          - legal-os
          - member-os
          - money-golfwing
          - reserve-os
          - shift-cloud
          - survey-os
    env:
      # ビルド用ダミー（実キーはVercel envのみ。Publicリポジトリに実値を置かない #14/#26）
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      NEXT_PUBLIC_SITE_URL: https://example.com
      RESEND_API_KEY: dummy
      RESERVE_FROM_EMAIL: dummy@example.com
      RESERVE_STAFF_EMAIL: dummy@example.com
      LEGAL_API_TOKEN: dummy
      CRON_SECRET: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: tsc --noEmit
        working-directory: apps/${{ matrix.app }}
        run: npx tsc --noEmit
      - name: next build
        run: npm run build --workspace apps/${{ matrix.app }}
