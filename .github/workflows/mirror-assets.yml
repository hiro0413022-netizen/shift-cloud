      - name: Push to mirror branch
        run: |
          git config user.name "asset-mirror-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout --orphan asset-mirror
          git reset
          git add -f work
          git commit -m "chore: mirror kallinos site + corporate images ($(date -u +%F))"
          git push -f origin asset-mirror
