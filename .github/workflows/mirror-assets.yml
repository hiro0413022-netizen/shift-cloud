name: Mirror external assets
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/mirror-assets.yml']
permissions:
  contents: write
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror KALLINOS site (explicit pages)
        run: |
          mkdir -p work/kallinos/css work/kallinos/js
          cd work/kallinos
          for p in index.html products.html brand.html size-guide.html faq.html contact.html auth.html cart.html legal.html; do
            curl -sL --max-time 30 -o "$p" "https://www.kallinos.jp/$p" && echo "OK $p"
          done
          curl -sL -o css/style.css https://www.kallinos.jp/css/style.css
          curl -sL -o js/components.js https://www.kallinos.jp/js/components.js
          curl -sL -o js/main.js https://www.kallinos.jp/js/main.js
          ls -la
      - name: Download corporate images
        run: |
          mkdir -p work/corporate-images
          cd work/corporate-images
          dl(){ curl -sL --max-time 40 -o "$1" "$2" && echo "OK $1 $(stat -c%s "$1")"; }
